<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-icon">⚡</div>
        <h1>USOS Registration Bot</h1>
        <p>Konfiguracja automatycznej rejestracji</p>
    </div>

    <!-- Courses Section -->
    <div class="section">
        <div class="section-title">📚 Przedmioty</div>

        <div class="add-course-form">
            <div class="input-wrapper">
                <input type="text" id="new-course-name" class="input-field" placeholder="Nazwa przedmiotu">
            </div>
            <div class="input-wrapper group-input">
                <input type="number" id="new-course-group" class="input-field" placeholder="Grupa" min="1">
            </div>
            <button class="btn-add" id="btn-add-course" title="Dodaj przedmiot">+</button>
        </div>

        <div class="courses-list" id="courses-list">
            <!-- Dynamic course cards will be inserted here -->
        </div>

        <div class="empty-state" id="empty-state">
            <div class="icon">📭</div>
            Brak przedmiotów.<br>Dodaj przedmiot powyżej, wpisując nazwę i numer grupy.
        </div>
    </div>

    <!-- Time Config Section -->
    <div class="section">
        <div class="section-title">⏱️ Czas rejestracji</div>

        <div class="time-row">
            <div class="time-slot">
                <label>Godz</label>
                <input type="number" id="target_hour" class="input-field" placeholder="5" min="0" max="23">
            </div>
            <div class="time-colon">:</div>
            <div class="time-slot">
                <label>Min</label>
                <input type="number" id="target_minute" class="input-field" placeholder="59" min="0" max="59">
            </div>
            <div class="time-colon">:</div>
            <div class="time-slot">
                <label>Sek</label>
                <input type="number" id="target_second" class="input-field" placeholder="59" min="0" max="59">
            </div>
        </div>
    </div>

    <!-- Save -->
    <button class="btn-save" id="save">💾 Zapisz ustawienia</button>
    <div class="status-bar" id="status"></div>

    <!-- Footer -->
    <div class="footer">USOS Registration Bot • v1.0</div>

    <script src="popup.js"></script>
</body>

</html>
